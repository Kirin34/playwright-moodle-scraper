<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <title>Fixture SCORM</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f5f7;
        font-family: Arial, sans-serif;
      }

      #player {
        width: 800px;
        height: 600px;
        background: white;
        border: 1px solid #c9d0d8;
        display: grid;
        grid-template-rows: 1fr auto;
      }

      #slide {
        padding: 64px;
        display: grid;
        align-content: center;
        gap: 24px;
      }

      h1 {
        margin: 0;
        font-size: 42px;
      }

      p {
        margin: 0;
        font-size: 26px;
      }

      nav {
        padding: 18px;
        text-align: right;
        border-top: 1px solid #d7dde4;
      }
    </style>
  </head>
  <body>
    <main id="player">
      <section id="slide">
        <h1>Slide 1</h1>
        <p>Introduzione al corso</p>
      </section>
      <nav>
        <button type="button" id="next">SUCC</button>
      </nav>
    </main>
    <script>
      const slides = [
        ["Slide 1", "Introduzione al corso"],
        ["Slide 2", "Definizione principale: $a + b$"],
        ["Slide 3", "Conclusioni e idee chiave"]
      ];
      let index = 0;
      document.querySelector("#next").addEventListener("click", () => {
        if (index >= slides.length - 1) return;
        index += 1;
        setTimeout(() => {
          document.querySelector("h1").textContent = slides[index][0];
          document.querySelector("p").textContent = slides[index][1];
        }, 300);
      });
    </script>
  </body>
</html>
